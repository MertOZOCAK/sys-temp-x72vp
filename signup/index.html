<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaStream | Üye Ol</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body>
    <header class="navbar-container">
        <div class="nav-pill">
            <div class="nav-logo"><i class="fas fa-compact-disc"></i> <span>NovaStream</span></div>
            <nav class="nav-menu">
                <a href="../index.html" class="nav-link">Ana Sayfa</a>
                <a href="#" class="nav-link">Keşfet</a>
                <a href="#" class="nav-link">Kütüphane</a>
                <a href="#" class="nav-link premium"><i class="fas fa-crown"></i> Premium</a>
            </nav>
            <div class="nav-auth">
                <a class="btn-login" href="../login/index.html">Giriş Yap</a>
                <a class="btn-signup" href="../signup/index.html">Üye Ol</a>
            </div>
        </div>
    </header>

    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-head">
                <h1>Üye Ol</h1>
                <p>NovaStream'e katılmak için formu doldurun.</p>
            </div>
            <form class="auth-form">
                <label for="name">Ad Soyad</label>
                <input id="name" type="text" placeholder="Adınız Soyadınız" required>

                <label for="email">E-posta</label>
                <input id="email" type="email" placeholder="E-posta adresi" required>

                <label for="password">Şifre</label>
                <input id="password" type="password" placeholder="Şifreniz" required>

                <button type="submit" class="btn-signup">Üye Ol</button>
            </form>
            <p class="auth-footer">Zaten üye misin? <a href="../login/index.html">Giriş Yap</a></p>
        </div>
    </div>
    <footer class="site-footer">
        <div class="footer-logo"><i class="fas fa-compact-disc"></i> <span>NovaStream</span></div>
        <p>&copy; 2026 Tüm Hakları Saklıdır.</p>
    </footer>
</body>
</html>
