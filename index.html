<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaStream | Modern Müzik Çalar</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.13.0/css/all.min.css">
</head>
<body>

    <header class="navbar-container">
        <div class="nav-pill">
            <div class="nav-logo">
                <i class="fas fa-compact-disc"></i>
                <span>NovaStream</span>
            </div>
            <nav class="nav-menu">
                <a href="#" class="nav-link active">Ana Sayfa</a>
                <a href="#" class="nav-link">Keşfet</a>
                <a href="#" class="nav-link">Kütüphane</a>
                <a href="#" class="nav-link">Premium</a>
            </nav>
            <div class="nav-auth">
                <button class="btn-login">Giriş Yap</button>
                <button class="btn-signup">Üye Ol</button>
            </div>
        </div>
    </header>

    <div class="player">
        <div class="wrapper">
            <div class="menu-btn" onclick="togglePlaylist()">
                <i class="fa fa-bars"></i>
            </div>
            <div class="player-controls">
                <div class="details">
                    <div class="now-playing">1 / 4 ŞARKIDA ÇALINIYOR</div>
                    <div class="track-art"></div>
                    <div class="track-name">Şarkı Adı</div>
                    <div class="track-artist">Sanatçı Adı</div>
                </div>
                <div class="slider_container">
                    <div class="current-time">00:00</div>
                    <input type="range" min="1" max="100" value="0" class="seek_slider" onchange="seekTo()">
                    <div class="total-duration">00:00</div>
                </div>
                <div class="volume_box">
                    <i class="fa fa-volume-down"></i>
                    <input type="range" min="1" max="100" value="99" class="volume_slider" onchange="setVolume()">
                    <i class="fa fa-volume-up"></i>
                </div>
                <div class="buttons_container">
                    <div class="random-track" onclick="randomTrack()"><i class="fas fa-random"></i></div>
                    <div class="prev-track" onclick="prevTrack()"><i class="fa fa-step-backward fa-2x"></i></div>
                    <div class="playpause-track" onclick="playpauseTrack()"><i class="fa fa-play-circle fa-5x"></i></div>
                    <div class="next-track" onclick="nextTrack()"><i class="fa fa-step-forward fa-2x"></i></div>
                    <div class="repeat-track" onclick="repeatTrack()"><i class="fa fa-redo"></i></div>
                </div>
                <div id="wave">
                    <span class="stroke"></span><span class="stroke"></span><span class="stroke"></span>
                    <span class="stroke"></span><span class="stroke"></span><span class="stroke"></span>
                    <span class="stroke"></span>
                </div>
            </div>
            <div id="playlist-panel" class="playlist-panel">
                <div class="playlist-header">Şarkı Listesi</div>
                <ul id="playlist-items"></ul>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
