<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaStream | Müzik & Video</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body>
    <header class="navbar-container">
        <div class="nav-pill">
            <div class="nav-logo"><i class="fas fa-compact-disc"></i> <span>NovaStream</span></div>
            <nav class="nav-menu">
                <a href="../home/index.html" class="nav-link active">Ana Sayfa</a>
                <a href="#" class="nav-link">Keşfet</a>
                <a href="#" class="nav-link">Kütüphane</a>
                <a href="#" class="nav-link premium"><i class="fas fa-crown"></i> Premium</a>
            </nav>
            <div class="nav-auth">
                <a class="btn-login" href="../login/index.html">Giriş Yap</a>
                <a class="btn-signup" href="../signup/index.html">Üye Ol</a>
            </div>
        </div>
    </header>

    <div class="player">
        <div class="wrapper">
            <div class="menu-btn" onclick="togglePlaylist()"><i class="fa fa-bars"></i></div>
            <div class="player-controls">
                <div class="details">
                    <div class="now-playing">1 / 10 ŞARKIDA ÇALINIYOR</div>
                    
                    <div class="media-type-selector">
                        <span class="type-btn active" onclick="setMediaType('music')">Müzik</span>
                        <span class="type-btn" onclick="setMediaType('video')">Video</span>
                    </div>

                    <div class="track-art"></div>

                    <div class="video-container" id="video-container">
                        <video id="curr_video" class="curr-video" preload="metadata"></video>
                        <div id="video-error-msg" class="video-overlay">Video Mevcut Değil</div>
                    </div>

                    <div class="track-name">Şarkı Adı</div>
                    <div class="track-artist">Sanatçı Adı</div>
                </div>
                <div class="slider_container">
                    <div class="current-time">00:00</div>
                    <input type="range" min="1" max="100" value="0" class="seek_slider" onchange="seekTo()">
                    <div class="total-duration">00:00</div>
                </div>
                <div class="volume_box">
                    <i class="fa fa-volume-down"></i>
                    <input type="range" min="1" max="100" value="99" class="volume_slider" onchange="setVolume()">
                    <i class="fa fa-volume-up"></i>

                    <div class="speed-container">
                        <button class="speed-btn" onclick="toggleSpeedMenu()">1x</button>
                        <div id="speed-options" class="speed-options">
                            <div onclick="setSpeed(0.25)">0.25x</div>
                            <div onclick="setSpeed(0.50)">0.50x</div>
                            <div onclick="setSpeed(1)">1x</div>
                            <div onclick="setSpeed(1.25)">1.25x</div>
                            <div onclick="setSpeed(1.50)">1.50x</div>
                            <div onclick="setSpeed(2)">2x</div>
                            <div onclick="setSpeed(3)">3x</div>
                            <div onclick="setSpeed(4)">4x</div>
                        </div>
                    </div>
                </div>
                <div class="buttons_container">
                    <div class="random-track" onclick="randomTrack()"><i class="fas fa-random"></i></div>
                    <div class="prev-track" onclick="prevTrack()"><i class="fa fa-step-backward fa-2x"></i></div>
                    <div class="playpause-track" onclick="playpauseTrack()"><i class="fa fa-play-circle fa-5x"></i></div>
                    <div class="next-track" onclick="nextTrack()"><i class="fa fa-step-forward fa-2x"></i></div>
                    <div class="repeat-track" onclick="repeatTrack()"><i class="fa fa-redo"></i></div>
                </div>
                <div id="wave">
                    <span class="stroke"></span><span class="stroke"></span><span class="stroke"></span>
                    <span class="stroke"></span><span class="stroke"></span><span class="stroke"></span>
                    <span class="stroke"></span>
                </div>
            </div>
            <div id="playlist-panel" class="playlist-panel">
                <div class="playlist-header">Şarkı Listesi</div>
                <ul id="playlist-items"></ul>
            </div>
        </div>
    </div>

    <footer class="site-footer">
        <div class="footer-logo"><i class="fas fa-compact-disc"></i> <span>NovaStream</span></div>
        <p>&copy; 2026 Tüm Hakları Saklıdır.</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
